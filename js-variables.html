<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
    <title>Javascript Variables</title>
    <meta name="description" content="A short description of my site that appears in search results.">
    <meta name="author" content="Joshua Seth Jones">
    <script>
        // Java script land

        // let the keyword for a variable
        /*
            miltiline comment
            works for blocks of comments
        */
        let name = "Seth Jones";
        let age = 25;

        age += 1;

        // this works like print in Python
        console.log(age)

        // Constant mean the variable CANNOT change after the fact
        const NAME_OF_THE_CHURCH = "The Church of Jesus Christ of Latter-day Saints"

        // NAME_OF_THE_CHURCH = "Cowboy Church"

        console.log(NAME_OF_THE_CHURCH)

        if(name === "Seth Jones") {
            let greeting = "Welcome";

        }

        console.log(greeting);

    </script>
</head>

</body>
</html>
